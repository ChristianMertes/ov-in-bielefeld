services:
  web:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - db-data:/data
      - log-data:/app/logs
    env_file: .env
    environment:
      # Override .env to ensure both containers use the shared /data volume
      KINO_DB_PATH: /data/kino_ov.db
    restart: unless-stopped

  scheduler:
    build: .
    volumes:
      - db-data:/data
      - log-data:/app/logs
    env_file: .env
    environment:
      KINO_DB_PATH: /data/kino_ov.db
    restart: unless-stopped
    command: uv run python scheduler.py
    depends_on:
      web:
        condition: service_healthy

volumes:
  db-data:
  log-data:
